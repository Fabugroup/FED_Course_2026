<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inherit Styling</title>
    <!-- Inheritant Styling -->

    <style>
      /* style to be write as a class */
      .sone {
        color: red;
      }
      .stwo {
        color: blueviolet;
      }
    </style>
  </head>
  <body>
    <div class="sone">
      <!-- the elements inside the dov will inherit the style from the class -->
      <h1>Section One</h1>
      <p>Lorem ipsum dolor sit amet.</p>
    </div>
    <div class="stwo">
      <!-- the elements inside the dov will inherit the style from the class -->
      <h1>Section Two</h1>
      <p>Lorem ipsum dolor sit amet.</p>
    </div>
  </body>
</html>
