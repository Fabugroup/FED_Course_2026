<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* to a css class use ".(dot)classname" */
      /* for example .paragraph */

      .paraplain {
        color: white;
        letter-spacing: 5px;
      }

      .paramarked {
        background-color: blue;
      }

      /* id selector
      very rarely used
      used to stle a single element that matched the ID
      the selector starts with "#" and name of the ID */

      #head {
        color: orange;
      }
    </style>
  </head>
  <body>
    <h1 id="head">Welcome to Classes and ID in CSS</h1>

    <h2 class="paramarked">ID</h2>

    <p class="paraplain paramarked">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Rem voluptate,
      consequuntur, fugit recusandae ea in voluptas eius commodi expedita
      dolorem cupiditate fugiat aliquid similique consectetur esse ab est, magni
      nostrum.
    </p>
  </body>
</html>
