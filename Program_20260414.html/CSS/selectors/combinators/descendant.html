<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Descendant Selector</title>

    <style>
      /* the selector will be applicable to all child element
        to this case all p elements with a parent applied with .class */
      .class p {
        color: blue;
      }
    </style>
  </head>
  <body>
    <div class="class">
      <h1>Heading h1</h1>
      <h2>Heading h2</h2>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Aut dolor
        maiores labore quo dolorem neque vitae, quasi cumque assumenda animi
        beatae laboriosam id, illo voluptates fugit. Perspiciatis dolore unde
        repudiandae.
      </p>
    </div>
  </body>
</html>
