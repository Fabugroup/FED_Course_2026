<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .box {
        background-color: blue;
        color: white;
        text-align: center;
      }

      .pxbox {
        width: 96px;
        height: 96px;
        margin-bottom: 2px;
      }

      .ptbox {
        width: 72pt;
        height: 72pt;
        margin-bottom: 2px;
      }

      .inbox {
        width: 1in;
        height: 1in;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <div class="box pxbox">96px</div>
    <div class="box ptbox">72pt</div>
    <div class="box inbox">1in</div>
  </body>
</html>
