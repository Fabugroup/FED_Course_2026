<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .gi {
        background-color: blue;
        height: 100px;
        width: 100px;
        /* margin: 10px; */
      }

      .gc {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="gc">
      <div class="gi">row</div>
      <div class="gi">row</div>
      <div class="gi">row</div>
      <div class="gi">row</div>
    </div>
  </body>
</html>
