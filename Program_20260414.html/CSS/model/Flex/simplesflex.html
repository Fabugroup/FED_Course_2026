<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .container{
            background: linear-gradient(135deg, blue);
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            min-height: 100vh;
            margin: 0px;
        }
      .box {
        display:flex;
        justify-content: center;
        align-items: center;
        background-color: blueviolet;
        color: white;
        height: 10vh;
        width: 10vh;
        text-align: center;
        border-radius: 10px;
        margin: 2px;
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Item 1</div>
      <div class="box">Item 2</div>
      <div class="box">Item 3</div>
    </div>
  </body>
</html>
