<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change the Element with Script</title>
  </head>
  <body>
    <h1 id="h">Change the Element Type</h1>
    <div id="container">
      <p id="p">This is a paragraph</p>
    </div>
    <script>
      // current element in the div
      console.log(document.getElementById("p").innerText);

      // change the content of the div
      document.getElementById("container").innerHTML =
        "<h2>This paragraph is changed from H1 to H2</h2>";
      console.log(document.getElementById("container").innerText);
    </script>
  </body>
</html>
