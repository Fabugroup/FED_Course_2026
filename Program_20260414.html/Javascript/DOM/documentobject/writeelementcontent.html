<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write Element Content</title>
  </head>
  <body>
    <h1 id="head"></h1>
    <p id="content"></p>

    <script>
      // fetch the content of an element using a varible

      const data = document.getElementById("content");
      data.innerText = "This i a paragraph infused by JavaScript";

      // fetch the content of an element without using a variable
      document.getElementById("head").innerText = "Working with DOM";
    </script>
  </body>
</html>
