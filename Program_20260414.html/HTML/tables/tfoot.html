<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <td>Item</td>
          <td>Price</td>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Orange</td>
          <td>$5</td>
        </tr>
        <tr>
          <td>Apple</td>
          <td>$5</td>
        </tr>
        <tr>
          <td>Water</td>
          <td>$1</td>
        </tr>
      </tbody>

      <!-- tfoot are also providing a title label at the bottom of the table -->
      <tfoot>
        <tr>
          <td>Item</td>
          <td>Price</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
