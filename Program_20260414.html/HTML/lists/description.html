<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Working with Descriptive Lists</h1>
    <!-- dl, dt, dd are teh three tags -->

    <h2>Front End Glossary</h2>
    <!-- ol and li are 2 tags used -->

    <hr />
    <dl>
      <dt>HTML</dt>
      <dd>Used to create a structure of a web page</dd>
      <dt>CSS</dt>
      <dd>Used for Styling</dd>
      <dt>JavaScript</dt>
      <dd>Used for listening to events</dd>
    </dl>
    <br /><br />

    <!-- multiple dt's and single dd -->
    <dl>
      <dt>Milk</dt>
      <dt>Bread</dt>
      <dt>Eggs</dt>
      <dd>Menu for Breakfast</dd>
    </dl>

    <!-- one term and multiple definitions -->
    <dl>
      <dt>browser</dt>
      <dt>Chrome is a browser</dt>
      <dd>Opera is a browser</dd>
    </dl>
  </body>
</html>
