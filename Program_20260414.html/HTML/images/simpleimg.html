<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <hi>Working with Images</hi>
    <hr />
    <!-- img is the tag used for displaying images -->
    <!-- SRC = source -->
    <!-- img tag has 2 attributes mandatory -->
    <!-- ../ means previous folder -->
    <!-- img are inline elements -->
    <!-- alt="alternative text" is to used as a accessible perspective by naming the src img -->
    <!-- height and width is on pixel values -->

    <img
      src="../Resources/person1.jpg"
      alt="alternative text"
      height="275"
      width="200"
    />

    <img
      src="../Resources/person2.jpg"
      alt="alternative text"
      height="275"
      width="200"
    />

    <img
      src="../Resources/person3.jpg"
      alt="John's images"
      height="275"
      width="200"
    />

    <!-- the result show alt text "missing images" as the images is missing -->

    <img
      src="../Resources/person4.jpg"
      alt="missing images"
      height="275"
      width="200"
    />

    <!-- you can style it px = percentage -->
    <!-- the percentage is base o viewport -->
    <img
      src="../Resources/person1.jpg"
      alt="missing images"
      style="height: 100px"
      ;
      height="100px"
    />
  </body>
</html>
