<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root{
        --mright: 10px;
        --imwidth: 15vw;
        --imheight: 15vw;
      }
      .box {
        width: var(--imwidth);
        height: var(--imheight);
        background-color: aqua;
        float: left;
        margin-right: var(--mright);
        text-align: center;
        padding: 0px;
        border: 1px solid blue;
      }
            .box1 {
        width: var(--imwidth);
        height: var(--imheight);
        background-color: aqua;
        float: right;
        margin-right: var(--mright);
        text-align: center;
        padding: 0px;
        border: 1px solid blue;
      }
      img {
        weight: var(--imwidth);
        height: var(--imheight);
      }
    </style>
  </head>
  <body>
    <div class="box">
      <img src="../../HTML/Resources/person1.jpg" alt="Mary" />
    </div>
    <div class="box">
      <img src="../../HTML/Resources/person1.jpg" alt="Mary" />
    </div>
    <div class="box1">
      <img src="../../HTML/Resources/person3.jpg" alt="John" />
    </div>
    <div class="box1">
      <img src="../../HTML/Resources/person3.jpg" alt="John" />
    </div>
  </body>
</html>
