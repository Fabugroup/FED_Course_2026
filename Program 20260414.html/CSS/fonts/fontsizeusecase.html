<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .html {
        font-size: 100%;
        /* This 100% allow the html to listen to the OS/browser for the fotn size */
      }

      .p {
        font-size: 16px;
      }

      .r {
        /* by setting the font-size to rem, it will change according to the browser */
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <p class="html">The 100% of browser's fotn size</p>
    <p class="p">This is a pixel width. It will not change</p>
    <p class="r">This is a rem. Will change</p>
  </body>
</html>
