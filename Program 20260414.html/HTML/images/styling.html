<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <hi>Styling of Images</hi>
    <hr />
    <!-- img is the tag used for displaying images -->
    <!-- SRC = source -->
    <!-- img tag has 2 attributes mandatory -->
    <!-- ../ means previous folder -->
    <!-- img are inline elements -->
    <!-- alt="alternative text" is to used as a accessible perspective by naming the src img -->
    <!-- height and width is on pixel values -->

    <!-- style has 3 syntax -->
    <!-- style = line-width line-type line-colout  -->

    <img
      src="../Resources/person1.jpg"
      alt="alternative text"
      height="275"
      width="200"
      style="border: 2px solid black"
    />

    <!-- border-radius fillets the images - when border is 50%, it is a round  -->
    <img
      src="../Resources/person2.jpg"
      alt="alternative text"
      height="200"
      width="200"
      style="border-radius: 50%; border: 5px dotted cyan"
    />

    <img
      src="../Resources/person3.jpg"
      alt="John's images"
      style="height: 1%"
      height="275"
      width="200"
    />

    />
  </body>
</html>
