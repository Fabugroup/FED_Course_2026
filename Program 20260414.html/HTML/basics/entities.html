  <body>
    <!-- display special character where you cannot use in-->
    <!-- &lt; - entities use to how less than < symbol -->
    <!-- &gt; - entities use to greater than > symbol -->
    <!-- &amp; - entities use to am-percent & symbol -->
    <p>the &lt;br&gt; tag adds a new line character</p>
    <p><code>&amp;lt;</code> = &lt;</p>
    <p><code>&amp;amp;</code> = &amp;</p>
    <p><code>&amp;copy;</code> = &copy;</p>
    <p>&dollar;</p>
  </body>
