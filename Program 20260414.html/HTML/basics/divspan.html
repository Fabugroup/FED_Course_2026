<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Division -->
    <!-- Division are block level element -->
    <!-- Division are use extensively in HTML -->
    <!-- It is used to create sections in a page -->
    <!-- blocks are ot be used when there are no semantic equivalents for creaing sections -->
    <!-- a <div> tag is used to create a division -->
    <!-- Div by itself will not contain any content -->
    <!-- It is always a container holding other elements -->
    <!-- empty divs are not rendered -->

    <div>
      <h1>About ME:</h1>
      <h2>Name: Johnny</h2>
      <h2>Professional: Developer</h2>
    </div>

    <div>
      <h3>Skills</h3>
      <p>HTML</p>
      <p>Python</p>
    </div>

    <div style="color: blue; background-color: aqua">
      <h3>Experience</h3>
      <p>Lorem ipsum dolor sit amet.</p>
      <p>Lorem ipsum dolor sit amet.</p>
    </div>

    <!-- Nesting Div -->

    <div style="background-color: cornsilk; border: 1px solid brown">
      <p>Outer</p>
      <div
        style="background-color: chocolate; border: 1px solid rgb(43, 255, 0)"
      >
        <p>Inner</p>
      </div>
      <p>Outer</p>
    </div>

    <br /><br />

    <div style="height: 50px; width: 50%; background-color: gold"></div>
    <div style="height: 50px; background-color: rgb(34, 255, 0)"></div>
    <div style="height: 20px; background-color: gold"></div>

    <!-- division can be name as id tag -->
    <div id="200">
      <p>This is to give the id of the division</p>
    </div>

    <!-- Span -->
    <!-- Span is an inline element -->
    <!-- most times used within a paragraph tag-->

    <h2 style="text-align: center">Demo of a Span</h2>
    <p>This is a sample of a <span style="color: red">span tag</span></p>
  </body>
</html>
