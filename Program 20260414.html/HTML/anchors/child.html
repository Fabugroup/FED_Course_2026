<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Child page</h1>

    <!-- _self will jump width the nest of the parent-->
    <a href="https://example.com" target="_self"> Open (_self) </a>
    <br />

    <!-- _parent will jump to a different tab > going to the parent level-->
    <a href="https://example.com" target="_parent"> Open (_parent) </a>
    <br />

    <!-- _top will jump to a different tab > going to the most top page-->
    <a href="https://example.com" target="_top"> Open (_top) </a>
  </body>
</html>
