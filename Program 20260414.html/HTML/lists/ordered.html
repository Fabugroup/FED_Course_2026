<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Working with Ordered Lists</h1>
    <h2>Steps to make the payment</h2>
    <!-- ol and li are 2 tags used -->

    <hr />
    <ol>
      <li>Register</li>
      <li>Login</li>
      <li>Pay</li>
    </ol>
    <br />
    <hr />
    <ol type="A">
      <li>Register</li>
      <li>Login</li>
      <li>Pay</li>
    </ol>
    <br />
    <hr />
    <ol type="a">
      <li>Register</li>
      <li>Login</li>
      <li>Pay</li>
    </ol>
    <br />
    <hr />
    <ol type="1">
      <li>Register</li>
      <li>Login</li>
      <li>Pay</li>
      <ol type="1">
        <li>open up your bank account</li>
        <li>click to pay</li>
      </ol>
    </ol>
  </body>
</html>
