<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern CSS Calculator UI</title>
    <style>
      :root {
        --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --calc-bg: rgba(255, 255, 255, 0.1);
        --btn-bg: rgba(255, 255, 255, 0.2);
        --btn-hover: rgba(255, 255, 255, 0.3);
        --accent-color: #ff9f0a;
        --text-color: #ffffff;
        --display-bg: rgba(0, 0, 0, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-gradient);
        padding: 20px;
      }

      .calculator {
        width: 100%;
        max-width: 360px;
        background: var(--calc-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;
        padding: 25px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      }

      .display {
        width: 100%;
        height: 100px;
        background: var(--display-bg);
        border-radius: 15px;
        margin-bottom: 25px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-end;
        padding: 15px;
        overflow: hidden;
        word-wrap: break-word;
        word-break: break-all;
      }

      .previous-operand {
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.1rem;
        margin-bottom: 5px;
        min-height: 1.2rem;
      }

      .current-operand {
        color: var(--text-color);
        font-size: 2.5rem;
        font-weight: 300;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }

      button {
        aspect-ratio: 1/1;
        border: none;
        border-radius: 18px;
        background: var(--btn-bg);
        color: var(--text-color);
        font-size: 1.4rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      button:hover {
        background: var(--btn-hover);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(1px);
      }

      .operator {
        background: rgba(255, 255, 255, 0.1);
        color: var(--accent-color);
        font-weight: bold;
      }

      .equals {
        background: var(--accent-color);
        grid-column: span 2;
        aspect-ratio: auto;
        border-radius: 18px;
      }

      .equals:hover {
        background: #ffb340;
      }

      .clear {
        color: #ff4b5c;
      }

      /* Responsive adjustments for small mobile screens */
      @media (max-height: 600px) {
        .calculator {
          padding: 15px;
        }
        .display {
          height: 70px;
          margin-bottom: 15px;
        }
        .current-operand {
          font-size: 1.8rem;
        }
        .buttons {
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="display">
        <div id="previous-operand" class="previous-operand"></div>
        <div id="current-operand" class="current-operand">0</div>
      </div>

      <div class="buttons">
        <button class="operator clear" data-action="clear">AC</button>
        <button class="operator" data-action="delete">DEL</button>
        <button class="operator" data-action="percent">%</button>
        <button class="operator" data-operation="/">÷</button>

        <button data-number>7</button>
        <button data-number>8</button>
        <button data-number>9</button>
        <button class="operator" data-operation="*">×</button>

        <button data-number>4</button>
        <button data-number>5</button>
        <button data-number>6</button>
        <button class="operator" data-operation="-">−</button>

        <button data-number>1</button>
        <button data-number>2</button>
        <button data-number>3</button>
        <button class="operator" data-operation="+">+</button>

        <button data-number>0</button>
        <button data-number>.</button>
        <button class="equals" data-action="equals">=</button>
      </div>
    </div>

    <script>
      class Calculator {
        constructor(previousOperandElement, currentOperandElement) {
          this.previousOperandElement = previousOperandElement;
          this.currentOperandElement = currentOperandElement;
          this.clear();
        }

        clear() {
          this.currentOperand = "0";
          this.previousOperand = "";
          this.operation = undefined;
          this.shouldResetScreen = false;
        }

        delete() {
          if (this.currentOperand === "0") return;
          if (this.currentOperand.length === 1) {
            this.currentOperand = "0";
          } else {
            this.currentOperand = this.currentOperand.toString().slice(0, -1);
          }
        }

        appendNumber(number) {
          if (number === "." && this.currentOperand.includes(".")) return;
          if (
            (this.currentOperand === "0" && number !== ".") ||
            this.shouldResetScreen
          ) {
            this.currentOperand = number.toString();
            this.shouldResetScreen = false;
          } else {
            this.currentOperand =
              this.currentOperand.toString() + number.toString();
          }
        }

        chooseOperation(operation) {
          if (this.currentOperand === "") return;
          if (this.previousOperand !== "") {
            this.compute();
          }
          this.operation = operation;
          this.previousOperand = this.currentOperand;
          this.currentOperand = "";
        }

        compute() {
          let computation;
          const prev = parseFloat(this.previousOperand);
          const current = parseFloat(this.currentOperand);
          if (isNaN(prev) || isNaN(current)) return;

          switch (this.operation) {
            case "+":
              computation = prev + current;
              break;
            case "-":
              computation = prev - current;
              break;
            case "*":
              computation = prev * current;
              break;
            case "/":
              computation = prev / current;
              break;
            default:
              return;
          }
          this.currentOperand = computation.toString();
          this.operation = undefined;
          this.previousOperand = "";
          this.shouldResetScreen = true;
        }

        percent() {
          const current = parseFloat(this.currentOperand);
          if (isNaN(current)) return;
          this.currentOperand = (current / 100).toString();
        }

        updateDisplay() {
          this.currentOperandElement.innerText = this.currentOperand;
          if (this.operation != null) {
            this.previousOperandElement.innerText = `${this.previousOperand} ${this.operation}`;
          } else {
            this.previousOperandElement.innerText = "";
          }
        }
      }

      const numberButtons = document.querySelectorAll("[data-number]");
      const operationButtons = document.querySelectorAll("[data-operation]");
      const equalsButton = document.querySelector('[data-action="equals"]');
      const deleteButton = document.querySelector('[data-action="delete"]');
      const allClearButton = document.querySelector('[data-action="clear"]');
      const percentButton = document.querySelector('[data-action="percent"]');
      const previousOperandElement =
        document.getElementById("previous-operand");
      const currentOperandElement = document.getElementById("current-operand");

      const calculator = new Calculator(
        previousOperandElement,
        currentOperandElement,
      );

      numberButtons.forEach((button) => {
        button.addEventListener("click", () => {
          calculator.appendNumber(button.innerText);
          calculator.updateDisplay();
        });
      });

      operationButtons.forEach((button) => {
        button.addEventListener("click", () => {
          calculator.chooseOperation(button.getAttribute("data-operation"));
          calculator.updateDisplay();
        });
      });

      equalsButton.addEventListener("click", (button) => {
        calculator.compute();
        calculator.updateDisplay();
      });

      allClearButton.addEventListener("click", (button) => {
        calculator.clear();
        calculator.updateDisplay();
      });

      deleteButton.addEventListener("click", (button) => {
        calculator.delete();
        calculator.updateDisplay();
      });

      percentButton.addEventListener("click", (button) => {
        calculator.percent();
        calculator.updateDisplay();
      });
    </script>
  </body>
</html>
